name: release

# Builds every platform adapter and publishes them as a GitHub Release. The download page at
# www.mcbans.com/downloads links to the stable per-platform asset names below via
# `releases/latest/download/<asset>`, so it always serves the newest published build.
#
# Trigger by pushing a tag (e.g. `git tag v1.0.0 && git push origin v1.0.0`) or run the
# "release" workflow manually (workflow_dispatch) with a tag name.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Forge brings its own (slow) ForgeGradle decompile pipeline — cache it between runs.
      - name: Cache ForgeGradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches/forge_gradle
          key: forgegradle-${{ runner.os }}-1.20.1-47.2.0
          restore-keys: forgegradle-${{ runner.os }}-

      - name: Build Bukkit / Spigot / Sponge / BungeeCord adapters
        run: ./gradlew :bukkit:build :spigot:build :sponge:build :bungeecord:build --no-daemon --stacktrace

      - name: Build Forge mod
        run: ./gradlew :forge:build --no-daemon --stacktrace

      # Stable, version-less asset names so `releases/latest/download/<name>` is permanent.
      - name: Collect release jars (stable names)
        run: |
          mkdir -p release
          cp bukkit/build/libs/McBans-Bukkit-*.jar          release/McBans-Bukkit.jar
          cp spigot/build/libs/McBans-Spigot-*.jar          release/McBans-Spigot.jar
          cp sponge/build/libs/McBans-Sponge-*.jar          release/McBans-Sponge.jar
          cp forge/build/libs/McBans-Forge-*.jar            release/McBans-Forge.jar
          cp bungeecord/build/libs/McBans-BungeeCord-*.jar  release/McBans-BungeeCord.jar
          ls -l release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: MCBans ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: release/*.jar
