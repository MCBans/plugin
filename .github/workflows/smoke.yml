name: smoke-test

# Boots a real server of each platform with the built jar and asserts the plugin loads/enables
# (scripts/smoke-test.sh). Heavy (downloads servers + Minecraft), so it runs on demand and weekly
# rather than on every push.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [bukkit, spigot, bungeecord, sponge, forge]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache ForgeGradle
        if: matrix.platform == 'forge'
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches/forge_gradle
          key: forgegradle-${{ runner.os }}-1.20.1-47.2.0

      - name: Build the ${{ matrix.platform }} jar
        run: ./gradlew :${{ matrix.platform }}:build --no-daemon --stacktrace

      - name: Boot ${{ matrix.platform }} and verify the plugin enables
        run: ./gradlew --stop; bash scripts/smoke-test.sh ${{ matrix.platform }}

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ matrix.platform }}-log
          path: .servertest/${{ matrix.platform }}/server.log
          if-no-files-found: ignore
